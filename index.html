<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminheart | Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #1a1a1a;
            color: #E6BE8A;
            margin: 0;
            padding: 20px;
            font-family: 'Instrument Serif', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 380px;
            text-align: center;
            padding: 20px;
        }

        .logo-img {
            width: 120px;
            border-radius: 50%;
            border: 1px solid #E6BE8A;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(230, 190, 138, 0.2);
        }

        h1 { 
            font-size: 2.8rem; 
            margin-bottom: 5px; 
            color: #E6BE8A; 
            font-weight: 400;
        }

        .tagline {
            font-style: italic; 
            letter-spacing: 2px; 
            text-transform: lowercase; 
            opacity: 0.9; 
            margin-top: -10px; 
            margin-bottom: 40px;
            color: #F5F5DC;
            font-size: 1.1rem;
        }

        .links-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            gap: 18px; 
        }
        
        .link-card {
            background-color: #F5F5DC;   
            color: #1a1a1a;              
            border: 1px solid #E6BE8A;   
            border-radius: 2px;
            padding: 18px;
            text-decoration: none;
            width: 100%;
            max-width: 300px;
            text-align: center;
            display: block;
            font-size: 1.1rem;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        /* Etsy highlight effect */
        .link-card.primary {
            background-color: #E6BE8A;
            color: #1a1a1a;
            font-weight: bold;
        }

        .link-card::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-25deg);
            animation: shimmer 4s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            20% { left: 150%; }
            100% { left: 150%; }
        }

        .link-card:hover {
            background-color: #E6BE8A;   
            color: #ffffff;              
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(230, 190, 138, 0.3);
        }

        .highlights-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 45px;
            margin-bottom: 20px;
            width: 100%;
        }

        .highlight-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }

        .highlight-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid #E6BE8A;
            background-color: #F5F5DC;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            transition: transform 0.3s ease;
        }

        .highlight-label {
            font-size: 0.75rem;
            color: #F5F5DC;
            margin-top: 8px;
            text-transform: lowercase;
            font-style: italic;
        }

        .copy-btn { 
            background: transparent;
            color: #E6BE8A;
            border: 1px solid #E6BE8A;
            padding: 12px 24px;
            margin-top: 40px;
            font-family: 'Instrument Serif', serif;
            font-style: italic;
            cursor: pointer;
            border-radius: 2px;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        footer { 
            margin-top: 60px; 
            font-size: 0.65rem; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            color: #F5F5DC;
            opacity: 0.4; 
        }
    </style>
</head>
<body>

<div class="container">
    <img src="Luminheart.jpg" alt="Luminheart Logo" class="logo-img">

    <h1>Luminheart</h1>
    <p class="tagline">waxes to warm the soul</p>
    
    <div class="links-wrapper">
        <a href="https://www.etsy.com/uk/shop/Luminheartuk" class="link-card primary">Shop on Etsy</a>
        
        <a href="https://www.facebook.com/profile.php?id=61586576870341" class="link-card">Facebook</a>
        <a href="https://www.tiktok.com/@.luminheart" class="link-card">TikTok</a>
        <a href="https://www.instagram.com/_luminheart_/" class="link-card">Instagram</a>
        <a href="https://uk.pinterest.com/luminheart/" class="link-card">Pinterest</a>
    </div>

    <div class="highlights-container">
        <a href="https://www.etsy.com/uk/shop/Luminheartuk" class="highlight-item">
            <div class="highlight-circle">🕯️</div>
            <span class="highlight-label">new in</span>
        </a>
        <a href="#" class="highlight-item">
            <div class="highlight-circle">✨</div>
            <span class="highlight-label">our story</span>
        </a>
        <a href="#" class="highlight-item">
            <div class="highlight-circle">🤍</div>
            <span class="highlight-label">favorites</span>
        </a>
    </div>

    <button class="copy-btn" onclick="copyToClipboard()">🔗 Copy My Hub Link</button>

    <footer>Private & Secure Hub</footer>
</div>

<script>
    function copyToClipboard() {
        const url = window.location.href;
        navigator.clipboard.writeText(url).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.innerText = "✅ Link Copied!";
            setTimeout(() => { btn.innerText = "🔗 Copy My Hub Link"; }, 2000);
        });
    }
</script>

</body>
</html>
